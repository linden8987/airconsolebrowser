<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script type="text/javascript" src="https://airconsole.com/api/airconsole-1.11.0.js"></script>
  <style>
    body { background: #16213e; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
    .view { display: none; }
    input { width: 85%; padding: 15px; border-radius: 8px; border: none; margin-bottom: 10px; }
    button { width: 90%; padding: 15px; background: #4285f4; color: white; border: none; border-radius: 8px; margin: 5px; }
    #pong-canvas { width: 100%; height: 300px; background: black; border: 2px solid #4285f4; }
  </style>
</head>
<body>
  <div id="view-vote" class="view" style="display:block;">
    <input type="text" id="vote-input" placeholder="Enter suggestion...">
    <button onclick="submit()">Submit</button>
    <button onclick="finish()">I'm Finished</button>
  </div>
  <div id="view-pong" class="view">
    <canvas id="pong-canvas" width="300" height="300"></canvas>
    <button id="btn-final-search" style="display:none;" onclick="triggerGlobalSearch()">Perform Search</button>
  </div>

  <script>
    var airconsole = new AirConsole();

    function submit() {
      let text = document.getElementById('vote-input').value;
      airconsole.message(AirConsole.SCREEN, {action: "submit", text: text});
      document.getElementById('vote-input').value = "";
    }

    function finish() {
      airconsole.message(AirConsole.SCREEN, {action: "done_voting"});
      document.getElementById("view-vote").style.display = 'none';
      document.getElementById("view-pong").style.display = 'block';
      startPong();
    }

    airconsole.onMessage = function(from, data) {
      if (data.action === "status_update") {
        var isMaster = (airconsole.getDeviceId() === airconsole.getMasterControllerDeviceId());
        if (isMaster && data.ready >= data.total) {
          document.getElementById("btn-final-search").style.display = "block";
        }
      }
    };

    function triggerGlobalSearch() {
      airconsole.message(AirConsole.SCREEN, {action: "reveal_results"});
    }

    function startPong() {
      let canvas = document.getElementById('pong-canvas');
      let ctx = canvas.getContext('2d');
      function draw() {
        ctx.fillStyle = "black"; ctx.fillRect(0,0, canvas.width, canvas.height);
        ctx.fillStyle = "white"; ctx.fillRect(10, 50, 10, 50); // Paddle
        requestAnimationFrame(draw);
      }
      draw();
    }
  </script>
</body>
</html>
