<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script type="text/javascript" src="https://airconsole.com/api/airconsole-1.11.0.js"></script>
  <style>
    body { background: #0b0c10; color: white; text-align: center; font-family: sans-serif; }
    .view { display: none; }
    canvas { width: 90%; height: 300px; background: black; border: 2px solid #4285f4; }
    .btn { padding: 25px; margin: 20px; background: #4285f4; border-radius: 12px; }
  </style>
</head>
<body onload="init()">
  <div id="view-vote" class="view" style="display:block;">
    <div class="btn" onclick="castVote()">Vote</div>
  </div>
  <div id="view-pong" class="view">
    <canvas id="canvas"></canvas>
  </div>
  <div id="view-try-again" class="view">
    <div class="btn" onclick="resetGame()">Try Again</div>
  </div>

  <script>
    var airconsole;
    function init() {
      airconsole = new AirConsole();
      airconsole.onMessage = function(from, data) {
        if (data.action === "voting_complete") {
          document.getElementById("view-vote").style.display = "none";
          document.getElementById("view-pong").style.display = "block";
          startPong();
        }
      };
    }

    function castVote() {
      airconsole.message(AirConsole.SCREEN, {action: "cast_vote"});
      document.getElementById("view-vote").style.display = "none";
      document.getElementById("view-pong").style.display = "block";
      startPong();
    }

    function startPong() {
      let canvas = document.getElementById("canvas");
      let ctx = canvas.getContext("2d");
      function loop() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.fillRect(10, 50, 10, 50); // Paddle
        requestAnimationFrame(loop);
      }
      loop();
    }

    function resetGame() {
      airconsole.message(AirConsole.SCREEN, {action: "reset"});
      document.getElementById("view-try-again").style.display = "none";
      document.getElementById("view-vote").style.display = "block";
    }
  </script>
</body>
</html>
