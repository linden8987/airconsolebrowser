<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" src="https://airconsole.com/api/airconsole-1.11.0.js"></script>
    <script>
        var airconsole;
        var suggestions = []; // Stores {text, votes}
        var screenState = "SUGGEST";

        var transitions = {
            SUGGEST: () => {
                screenState = "SUGGEST";
                // Show suggestion input UI
            },
            VOTE: () => {
                screenState = "VOTE";
                // Show poll UI
            },
            RESULTS: (query) => {
                screenState = "RESULTS";
                document.getElementById("browser-frame").src = "https://www.google.com/search?igu=1&q=" + encodeURIComponent(query);
            }
        };

        function init() {
            airconsole = new AirConsole();
            airconsole.onMessage = function(from, data) {
                if (data.action === "submit") {
                    suggestions.push({text: data.text, votes: 0});
                    airconsole.broadcast({action: "update_suggestions", list: suggestions});
                }
                if (data.action === "vote") {
                    suggestions[data.index].votes++;
                    // Broadcast vote update
                }
                if (data.action === "start_vote") transitions.VOTE();
                if (data.action === "reveal") {
                    let winner = suggestions.sort((a,b) => b.votes - a.votes)[0];
                    transitions.RESULTS(winner.text);
                }
            };
        }
    </script>
</head>
<body onload="init()">
    <iframe id="browser-frame" style="width:100%; height:100vh;"></iframe>
</body>
</html>
