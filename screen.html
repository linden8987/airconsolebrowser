<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script type="text/javascript" src="https://airconsole.com/api/airconsole-1.11.0.js"></script>
  <style>
    body { background: #0b0c10; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
    .game-btn { display: block; width: 90%; padding: 20px; margin: 15px auto; background: #1f4068; border: 2px solid #4285f4; color: white; border-radius: 12px; }
    #home-btn { padding: 15px 30px; background: #e74c3c; border-radius: 8px; margin-top: 20px; display: none; }
  </style>
</head>
<body>
  <div id="hub-ui">
    <h1>games.</h1>
    <button class="game-btn" onclick="launchGame('browsescreen.html', 'browsecontroller.html')">Browse</button>
  </div>

  <button id="home-btn" onclick="goHome()">Back to Hub</button>

  <script>
    var airconsole = new AirConsole();

    function launchGame(screenFile, controllerFile) {
      // Broadcast to everyone: Move to the game
      airconsole.broadcast({action: "launch_game", screenFile: screenFile});
      window.location.href = controllerFile;
    }

    // Logic for the Game Controller pages
    function initGameController() {
      // Show Home button only if Master[span_1](start_span)[span_1](end_span)
      if (airconsole.getDeviceId() === airconsole.getMasterControllerDeviceId()) {
        document.getElementById("home-btn").style.display = "inline-block";
      }
      document.getElementById("hub-ui").style.display = "none";
    }

    function goHome() {
      airconsole.message(AirConsole.SCREEN, {action: "go_home"});
      airconsole.broadcast({action: "navigate_home"});
    }

    airconsole.onMessage = function(from, data) {
      if (data.action === "navigate_home") {
        window.location.href = "controller.html";
      }
    };
    
    // If we are on a game controller page, initialize the UI
    if (window.location.pathname.includes("browsecontroller.html")) {
      initGameController();
    }
  </script>
</body>
</html>
