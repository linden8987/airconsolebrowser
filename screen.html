<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Together Browser - Master Screen</title>
  <script type="text/javascript" src="https://airconsole.com/api/airconsole-1.11.0.js"></script>
  <style>
    body { margin: 0; background: #090a0f; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    .panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; }
    #browser-frame { width: 100%; height: 100%; border: none; background: white; }
  </style>
</head>
<body onload="init()">
  <div id="panel-suggesting" class="panel" style="display: flex;"><h1>What should we Google?</h1><div id="suggestion-list"></div></div>
  <div id="panel-voting" class="panel"><h1>Cast Your Ballots!</h1><div id="voting-grid"></div></div>
  <iframe id="browser-frame" class="panel"></iframe>

  <script>
    var airconsole;
    var searchSuggestions = [];
    var votesReceived = 0;

    function init() {
      airconsole = new AirConsole();
      airconsole.onMessage = function(from, data) {
        if (data.action === "submit") {
          searchSuggestions.push({id: Date.now(), text: data.text, votes: 0});
        }
        if (data.action === "cast_vote") {
          votesReceived++;
          if (votesReceived >= airconsole.getControllerDeviceIds().length) {
            let winner = searchSuggestions.sort((a,b) => b.votes - a.votes)[0];
            document.getElementById("panel-voting").style.display = "none";
            let frame = document.getElementById("browser-frame");
            frame.style.display = "block";
            frame.src = "https://www.google.com/search?igu=1&q=" + encodeURIComponent(winner.text);
            airconsole.broadcast({action: "voting_complete"});
          }
        }
        if (data.action === "reset") {
          searchSuggestions = []; votesReceived = 0;
          document.getElementById("browser-frame").style.display = "none";
          document.getElementById("panel-suggesting").style.display = "flex";
        }
      };
    }
  </script>
</body>
</html>
