<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>games.</title>
  <script type="text/javascript" src="https://airconsole.com/api/airconsole-1.11.0.js"></script>
  <style>
    body { margin: 0; background: #090a0f; color: white; height: 100vh; overflow: hidden; }
    #launcher-ui { text-align: center; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #game-frame { width: 100vw; height: 100vh; border: none; display: none; }
  </style>
</head>
<body>
  <div id="launcher-ui">
    <h1>games.</h1>
  </div>
  <iframe id="game-frame"></iframe>

  <script>
    var airconsole = new AirConsole();

    airconsole.onMessage = function(from, data) {
      if (data.action === "launch") {
        document.getElementById('launcher-ui').style.display = 'none';
        let frame = document.getElementById('game-frame');
        frame.style.display = 'block';
        frame.src = data.screenFile;
      }
      if (data.action === "go_home") {
        document.getElementById('game-frame').style.display = 'none';
        document.getElementById('launcher-ui').style.display = 'flex';
        document.getElementById('game-frame').src = "";
      }
    };
  </script>
</body>
</html>
