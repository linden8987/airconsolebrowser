<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Together Browser - Display</title>
  <script type="text/javascript" src="https://airconsole.com/api/airconsole-1.11.0.js"></script>
  <style>
    body { margin: 0; background: #090a0f; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #browser-frame { width: 90%; height: 80vh; border: none; display: none; }
  </style>
</head>
<body>
  <div id="display-area">
    <h1>Waiting for Master Controller...</h1>
    <div id="list-area"></div>
  </div>
  <iframe id="browser-frame"></iframe>

  <script>
    var airconsole = new AirConsole();

    airconsole.onMessage = function(from, data) {
      if (data.action === "update_list") {
        document.getElementById('list-area').innerHTML = data.html;
      }
      if (data.action === "show_results") {
        document.getElementById('display-area').style.display = 'none';
        let frame = document.getElementById('browser-frame');
        frame.style.display = 'block';
        frame.src = "https://www.google.com/search?igu=1&q=" + encodeURIComponent(data.query);
      }
    };
  </script>
</body>
</html>
