<!DOCTYPE html>
<html lang="en">
<head>
    <title>AirConsole Simulator</title>
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
      body { font-family: sans-serif; background: #1f1f1f; color: white; margin: 0; }
      .menu { background: black; padding: 10px; text-align: center; }
      #content { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
      .device { border: 2px solid white; background: #3b3b3b; margin: 10px; padding: 5px; }
      iframe { border: none; background: white; display: block; }
      #load { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1f1f1f; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="menu">
    <button onclick="addController()">Add Controller</button>
</div>

<div id="content">
    <div class="device">
        <h3>Screen</h3>
        <iframe id="screen_iframe" style="width: 960px; height: 540px;"></iframe>
    </div>
</div>

<div id="load">
    <h2>Enter Base Game URL</h2>
    <input id="base_url" size="50" placeholder="https://example.com/game/">
    <br><br>
    <button onclick="loadGame()">Load Game</button>
</div>

<script>
    let baseUrl = "";
    const controllers = [];

    function loadGame() {
        let input = document.getElementById('base_url').value;
        if (!input.endsWith('/')) input += '/';
        baseUrl = input;

        document.getElementById('screen_iframe').src = baseUrl + "screen.html";
        document.getElementById('load').style.display = 'none';
    }

    function addController() {
        if (!baseUrl) return;
        
        const i = controllers.length + 1;
        const iframe = $("<iframe></iframe>").addClass('controller-iframe').attr({
            src: baseUrl + "controller.html",
            style: "width: 320px; height: 480px;"
        });
        
        const container = $("<div class='device'></div>").append(`<div>Controller ${i}</div>`).append(iframe);
        $("#content").append(container);
        controllers.push(iframe[0]);
    }

    // Message Hub: Listens to controllers and relays to screen
    window.addEventListener("message", (event) => {
        const screen = document.getElementById('screen_iframe').contentWindow;
        
        // Ensure the message is coming from a controller iframe
        if (event.data && event.data.type === 'controller_input') {
            console.log("Relaying to screen:", event.data);
            screen.postMessage(event.data, "*");
        }
    });
</script>
</body>
</html>
