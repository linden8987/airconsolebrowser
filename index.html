<html lang="en">
<head>
    <title>AirConsole - Developer Console (Optimized)</title>
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Play:400,700" rel="stylesheet" type="text/css">
    <script type="text/javascript" src="/file/jquery.min.js"></script>
    <script type="module">
      export function verifyUnityPluginVersion(unityPluginVersion) {
        const pluginVersionParts = unityPluginVersion.split('.');
        let isUpToDate = false;
        if (pluginVersionParts.length >= 3) {
          const major = parseInt(pluginVersionParts[0], 10) || 0;
          const minor = parseInt(pluginVersionParts[1], 10) || 0;
          const patch = parseInt(pluginVersionParts[2], 10) || 0;
          isUpToDate = major > 2 || (major === 2 && minor >= 5 && patch >= 0);
        }
        if (!isUpToDate) {
          if (window.confirm('Outdated Unity AirConsole Plugin!')) {
            document.location.href = 'https://github.com/AirConsole/airconsole-unity-plugin/releases';
          }
        }
        return isUpToDate;
      }
      window.AC_SIMULATOR = { verifyUnityPluginVersion };
    </script>
    <script type="text/javascript">
      var code, devices, laying_out = false, last_width = 0, last_height = 0, last_scale = 1, is_paused = false, device_height = 580;
      var resolutions = {
        "Full HD": { "width": 1920, "height": 1080 },
        "Mini SmartTV": { "width": 960, "height": 540 },
        "MacBook Air 13": { "width": 1440, "height": 900 },
        "3:2": { "aspect_ratio": 3/2, "type": ["controller"] },
        "16:9": { "aspect_ratio": 16/9, "type": ["controller"] }
      };

      function addDevice(device_format) {
        var i = devices.length;
        var container = $("<div class=device></div>").attr("id", "device_" + i);
        
        // Added load event to prevent black flickering during init
        var iframe = $("<iframe>", {
          frameborder: '0',
          allow: 'autoplay; microphone; camera',
          id: 'controller-' + i,
          css: { backgroundColor: '#1f1f1f' } // Set background to match theme during load
        }).on('load', function() { $(this).css('background-color', 'white'); }).appendTo(container);

        var device_name = $("<div class=device_name>Device " + i + " (" + device_format + ")</div>").prependTo(container);
        $("#content").append(container);
        
        devices[i] = { size: resolutions[device_format], div: container, iframe: iframe };
        layout();
      }

      function layout(scale) {
        if (laying_out) return;
        laying_out = true;
        
        var w = $(window).width();
        var h = $(window).height() - 50;
        
        if (!scale) scale = last_scale;

        for (var i = 0; i < devices.length; ++i) {
          var device = devices[i];
          if (device) {
            let new_size = device.size.aspect_ratio ? { width: device_height / device.size.aspect_ratio, height: device_height } : device.size;
            device.iframe.css({ width: new_size.width + "px", height: new_size.height + "px" });
          }
        }

        var content = $("#content");
        content.css({ transform: "scale(" + scale + ")", transformOrigin: "top left" });
        
        // Safety check to prevent infinite loop or extreme scaling
        if (content.outerHeight() * scale > h && scale > 0.1) {
            last_scale = scale * 0.95;
            laying_out = false;
            layout(last_scale);
        } else {
            laying_out = false;
            last_scale = scale;
        }
      }

      $(document).ready(function() {
        devices = [{ size: resolutions["MacBook Air 13"], iframe: $("#screen_iframe"), div: $("#screen_div") }];
        $(window).resize(function() { layout(); });
        layout();
      });

      // ... (keep existing helper functions like getUrl, loadGame, etc.)
    </script>
    <style type="text/css">
      /* Added smooth transitions to prevent jarring screen updates */
      iframe { border: 1px solid #ddd; background-color: #1f1f1f; transition: background-color 0.3s ease; }
      #content { transition: transform 0.2s ease; }
      /* ... keep existing styles ... */
    </style>
</head>
<body>
    <!-- Existing UI Structure -->
    <div id="content">
      <div id="screen_div" class="device">
        <iframe id="screen_iframe" src="" frameborder="0" allow="autoplay; microphone; camera"></iframe>
      </div>
    </div>
</body>
</html>
